spring.application.name=taskmanager

# DATABASE
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/task_manager}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:yourpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# STATIC RESOURCES - Very Important!
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# SERVER
server.port=${PORT:8080}

# JWT
jwt.secret=${JWT_SECRET:taskManagerSecretKey12345678901234567890}
jwt.expiration=86400000