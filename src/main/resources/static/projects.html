<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .navbar { background: linear-gradient(135deg, #667eea, #764ba2); }
        .project-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            cursor: pointer;
        }
        .project-card:hover { transform: translateY(-5px); }
        .badge-admin { background: #667eea; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-4 py-3">
        <span class="navbar-brand fw-bold">
            <i class="bi bi-kanban"></i> Task Manager
        </span>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white" id="userName"></span>
        <button onclick="logout()" class="btn btn-outline-light btn-sm">
            <i class="bi bi-box-arrow-right"></i> Logout
        </button>
    </div>
</nav>

<div class="container mt-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">My Projects</h3>
        <button class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#createProjectModal">
            <i class="bi bi-plus-circle"></i> New Project
        </button>
    </div>

    <!-- Projects Grid -->
    <div class="row" id="projectsGrid">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary"></div>
            <p class="mt-2">Loading projects...</p>
        </div>
    </div>
</div>

<!-- Create Project Modal -->
<div class="modal fade" id="createProjectModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">
                    <i class="bi bi-plus-circle text-primary"></i>
                    Create New Project
                </h5>
                <button type="button" class="btn-close"
                        data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="createError" class="alert alert-danger d-none"></div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Project Name</label>
                    <input type="text" id="projectName"
                           class="form-control"
                           placeholder="Enter project name">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Description</label>
                    <textarea id="projectDesc" class="form-control"
                              rows="3"
                              placeholder="What is this project about?">
                        </textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary"
                        data-bs-dismiss="modal">Cancel</button>
                <button onclick="createProject()"
                        class="btn btn-primary" id="createBtn">
                    <i class="bi bi-plus-circle"></i> Create
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = 'taskmanager-production-4f97.up.railway.app';
    const token = localStorage.getItem('token');

    // Redirect to login if not logged in
    if (!token) window.location.href = 'login.html';

    // Show user name in navbar
    document.getElementById('userName').textContent =
        'Hello, ' + localStorage.getItem('userName');

    // Load projects when page opens
    loadProjects();

    async function loadProjects() {
        try {
            const response = await fetch(`${API}/api/projects`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            const data = await response.json();
            displayProjects(data);

        } catch (error) {
            document.getElementById('projectsGrid').innerHTML =
                '<p class="text-danger">Failed to load projects!</p>';
        }
    }

    function displayProjects(members) {
        const grid = document.getElementById('projectsGrid');

        if (members.length === 0) {
            grid.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <i class="bi bi-folder-x fs-1 text-muted"></i>
                        <p class="mt-2 text-muted">
                            No projects yet. Create your first one!
                        </p>
                    </div>`;
            return;
        }

        grid.innerHTML = members.map(member => `
                <div class="col-md-4 mb-4">
                    <div class="card project-card p-3"
                         onclick="openProject(${member.project.id})">
                        <div class="d-flex justify-content-between">
                            <h5 class="fw-bold">${member.project.name}</h5>
                            <span class="badge ${member.role === 'ADMIN' ?
            'bg-primary' : 'bg-secondary'}">
                                ${member.role}
                            </span>
                        </div>
                        <p class="text-muted small">
                            ${member.project.description || 'No description'}
                        </p>
                        <div class="mt-2">
                            <i class="bi bi-arrow-right-circle text-primary">
                            </i>
                            <span class="text-primary small">
                                View Tasks
                            </span>
                        </div>
                    </div>
                </div>
            `).join('');
    }

    async function createProject() {
        const name = document.getElementById('projectName').value;
        const description = document.getElementById('projectDesc').value;

        if (!name) {
            document.getElementById('createError').textContent =
                'Project name is required!';
            document.getElementById('createError')
                .classList.remove('d-none');
            return;
        }

        const btn = document.getElementById('createBtn');
        btn.textContent = 'Creating...';
        btn.disabled = true;

        try {
            const response = await fetch(`${API}/api/projects`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ name, description })
            });

            if (response.ok) {
                // Close modal and reload
                bootstrap.Modal.getInstance(
                    document.getElementById('createProjectModal')
                ).hide();
                document.getElementById('projectName').value = '';
                document.getElementById('projectDesc').value = '';
                loadProjects();
            }
        } catch (error) {
            alert('Failed to create project!');
        }

        btn.innerHTML = '<i class="bi bi-plus-circle"></i> Create';
        btn.disabled = false;
    }

    function openProject(projectId) {
        // Save project id and go to tasks page
        localStorage.setItem('currentProjectId', projectId);
        window.location.href = 'tasks.html';
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }
</script>
</body>
</html>
