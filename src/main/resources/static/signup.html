<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus fs-1 text-primary"></i>
                    <h2 class="fw-bold mt-2">Create Account</h2>
                    <p class="text-muted">Join Team Task Manager</p>
                </div>

                <!-- Error/Success Messages -->
                <div id="errorMsg" class="alert alert-danger d-none"></div>
                <div id="successMsg" class="alert alert-success d-none"></div>

                <!-- Signup Form -->
                <div id="nameGroup" class="mb-3">
                    <label class="form-label fw-bold">Full Name</label>
                    <input type="text" id="name"
                           class="form-control form-control-lg"
                           placeholder="Enter your name">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Email</label>
                    <input type="email" id="email"
                           class="form-control form-control-lg"
                           placeholder="Enter your email">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Password</label>
                    <input type="password" id="password"
                           class="form-control form-control-lg"
                           placeholder="Min 6 characters">
                </div>

                <button onclick="signup()"
                        class="btn btn-primary btn-lg w-100"
                        id="signupBtn">
                    <i class="bi bi-person-check"></i>
                    Create Account
                </button>

                <p class="text-center mt-3 text-muted">
                    Already have an account?
                    <a href="login.html">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    const API = '';

    async function signup() {
        // Get values
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // Simple validation
        if (!name || !email || !password) {
            showError('Please fill in all fields!');
            return;
        }
        if (password.length < 6) {
            showError('Password must be at least 6 characters!');
            return;
        }

        // Show loading
        const btn = document.getElementById('signupBtn');
        btn.innerHTML = 'Creating Account...';
        btn.disabled = true;

        try {
            const response = await fetch(`${API}/api/auth/signup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Save token and user info
                localStorage.setItem('token', data.token);
                localStorage.setItem('userName', data.name);
                localStorage.setItem('userEmail', data.email);

                showSuccess('Account created! Redirecting...');

                // Go to projects page
                setTimeout(() => {
                    window.location.href = 'projects.html';
                }, 1500);
            } else {
                showError(data.message || 'Signup failed!');
            }
        } catch (error) {
            showError('Cannot connect to server!');
        }

        btn.innerHTML = '<i class="bi bi-person-check"></i> Create Account';
        btn.disabled = false;
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.classList.remove('d-none');
        document.getElementById('successMsg').classList.add('d-none');
    }

    function showSuccess(msg) {
        const el = document.getElementById('successMsg');
        el.textContent = msg;
        el.classList.remove('d-none');
        document.getElementById('errorMsg').classList.add('d-none');
    }

    // Press Enter to signup
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') signup();
    });
</script>
</body>
</html>
