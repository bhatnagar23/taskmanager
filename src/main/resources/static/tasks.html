<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .navbar { background: linear-gradient(135deg, #667eea, #764ba2); }
        .task-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 15px;
        }
        .priority-HIGH { border-left: 4px solid #dc3545; }
        .priority-MEDIUM { border-left: 4px solid #ffc107; }
        .priority-LOW { border-left: 4px solid #28a745; }
        .status-badge-TODO { background: #6c757d; }
        .status-badge-IN_PROGRESS { background: #0d6efd; }
        .status-badge-DONE { background: #28a745; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-4 py-3">
    <div class="d-flex align-items-center gap-3">
        <a href="projects.html" class="btn btn-outline-light btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
        <span class="navbar-brand fw-bold mb-0">
                <i class="bi bi-kanban"></i> Tasks
            </span>
    </div>
    <div class="d-flex gap-2">
        <button onclick="showDashboard()"
                class="btn btn-outline-light btn-sm">
            <i class="bi bi-bar-chart"></i> Dashboard
        </button>
        <button onclick="logout()"
                class="btn btn-outline-light btn-sm">
            <i class="bi bi-box-arrow-right"></i> Logout
        </button>
    </div>
</nav>

<div class="container mt-4">

    <!-- Dashboard Stats (hidden by default) -->
    <div id="dashboardSection" class="d-none mb-4">
        <h5 class="fw-bold mb-3">
            <i class="bi bi-bar-chart text-primary"></i>
            Project Dashboard
        </h5>
        <div class="row" id="dashboardStats"></div>
    </div>

    <!-- Tasks Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">Project Tasks</h3>
        <button class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#createTaskModal">
            <i class="bi bi-plus-circle"></i> New Task
        </button>
    </div>

    <!-- Filter Buttons -->
    <div class="mb-3">
        <button onclick="filterTasks('ALL')"
                class="btn btn-sm btn-primary me-2">All</button>
        <button onclick="filterTasks('TODO')"
                class="btn btn-sm btn-secondary me-2">To Do</button>
        <button onclick="filterTasks('IN_PROGRESS')"
                class="btn btn-sm btn-info me-2">In Progress</button>
        <button onclick="filterTasks('DONE')"
                class="btn btn-sm btn-success">Done</button>
    </div>

    <!-- Tasks List -->
    <div id="tasksList">
        <div class="text-center py-5">
            <div class="spinner-border text-primary"></div>
            <p class="mt-2">Loading tasks...</p>
        </div>
    </div>
</div>

<!-- Create Task Modal -->
<div class="modal fade" id="createTaskModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">
                    <i class="bi bi-plus-circle text-primary"></i>
                    Create New Task
                </h5>
                <button type="button" class="btn-close"
                        data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-bold">Title</label>
                    <input type="text" id="taskTitle"
                           class="form-control"
                           placeholder="Task title">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Description</label>
                    <textarea id="taskDesc" class="form-control"
                              rows="2"
                              placeholder="Task description">
                        </textarea>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Due Date</label>
                        <input type="date" id="taskDueDate"
                               class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Priority</label>
                        <select id="taskPriority" class="form-select">
                            <option value="LOW">Low</option>
                            <option value="MEDIUM" selected>Medium</option>
                            <option value="HIGH">High</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Assign To (User ID)</label>
                    <input type="number" id="taskAssignedTo"
                           class="form-control"
                           placeholder="Enter user ID">
                    <small class="text-muted">
                        Enter the ID of the user to assign this task
                    </small>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary"
                        data-bs-dismiss="modal">Cancel</button>
                <button onclick="createTask()"
                        class="btn btn-primary" id="createTaskBtn">
                    <i class="bi bi-plus-circle"></i> Create Task
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = 'taskmanager-production-4f97.up.railway.app';
    const token = localStorage.getItem('token');
    const projectId = localStorage.getItem('currentProjectId');

    // Redirect if not logged in
    if (!token || !projectId) window.location.href = 'login.html';

    let allTasks = [];

    // Load tasks on page open
    loadTasks();

    async function loadTasks() {
        try {
            const response = await fetch(
                `${API}/api/tasks/project/${projectId}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

            allTasks = await response.json();
            displayTasks(allTasks);

        } catch (error) {
            document.getElementById('tasksList').innerHTML =
                '<p class="text-danger">Failed to load tasks!</p>';
        }
    }

    function displayTasks(tasks) {
        const list = document.getElementById('tasksList');

        if (tasks.length === 0) {
            list.innerHTML = `
                    <div class="text-center py-5">
                        <i class="bi bi-clipboard-x fs-1 text-muted"></i>
                        <p class="mt-2 text-muted">
                            No tasks yet. Create your first task!
                        </p>
                    </div>`;
            return;
        }

        list.innerHTML = tasks.map(task => `
                <div class="card task-card priority-${task.priority} p-3">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h6 class="fw-bold mb-1">${task.title}</h6>
                            <p class="text-muted small mb-1">
                                ${task.description || 'No description'}
                            </p>
                            <small class="text-muted">
                                <i class="bi bi-calendar"></i>
                                Due: ${task.dueDate || 'No date'}
                                &nbsp;|&nbsp;
                                <i class="bi bi-person"></i>
                                ${task.assignedTo ?
            task.assignedTo.name : 'Unassigned'}
                                &nbsp;|&nbsp;
                                Priority:
                                <strong>${task.priority}</strong>
                            </small>
                        </div>
                        <div class="d-flex flex-column align-items-end gap-2">
                            <span class="badge status-badge-${task.status}">
                                ${task.status.replace('_', ' ')}
                            </span>
                            <select onchange="updateStatus(${task.id}, this.value)"
                                    class="form-select form-select-sm"
                                    style="width: 130px">
                                <option ${task.status === 'TODO' ?
            'selected' : ''} value="TODO">
                                    To Do
                                </option>
                                <option ${task.status === 'IN_PROGRESS' ?
            'selected' : ''} value="IN_PROGRESS">
                                    In Progress
                                </option>
                                <option ${task.status === 'DONE' ?
            'selected' : ''} value="DONE">
                                    Done
                                </option>
                            </select>
                        </div>
                    </div>
                </div>
            `).join('');
    }

    function filterTasks(status) {
        if (status === 'ALL') {
            displayTasks(allTasks);
        } else {
            const filtered = allTasks.filter(t => t.status === status);
            displayTasks(filtered);
        }
    }

    async function updateStatus(taskId, newStatus) {
        try {
            await fetch(`${API}/api/tasks/${taskId}/status`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ status: newStatus })
            });
            loadTasks(); // Reload tasks
        } catch (error) {
            alert('Failed to update status!');
        }
    }

    async function createTask() {
        const body = {
            title: document.getElementById('taskTitle').value,
            description: document.getElementById('taskDesc').value,
            dueDate: document.getElementById('taskDueDate').value,
            priority: document.getElementById('taskPriority').value,
            projectId: projectId,
            assignedTo: document.getElementById('taskAssignedTo').value
        };

        if (!body.title || !body.dueDate || !body.assignedTo) {
            alert('Please fill all required fields!');
            return;
        }

        const btn = document.getElementById('createTaskBtn');
        btn.textContent = 'Creating...';
        btn.disabled = true;

        try {
            const response = await fetch(`${API}/api/tasks`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(body)
            });

            if (response.ok) {
                bootstrap.Modal.getInstance(
                    document.getElementById('createTaskModal')
                ).hide();
                loadTasks();
            } else {
                alert('Failed to create task! Make sure you are Admin.');
            }
        } catch (error) {
            alert('Error creating task!');
        }

        btn.innerHTML = '<i class="bi bi-plus-circle"></i> Create Task';
        btn.disabled = false;
    }

    async function showDashboard() {
        const section = document.getElementById('dashboardSection');

        // Toggle show/hide
        if (!section.classList.contains('d-none')) {
            section.classList.add('d-none');
            return;
        }

        try {
            const response = await fetch(
                `${API}/api/dashboard/${projectId}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

            const data = await response.json();

            document.getElementById('dashboardStats').innerHTML = `
                    <div class="col-md-3 mb-3">
                        <div class="card text-center p-3 border-0 shadow-sm">
                            <h2 class="fw-bold text-primary">
                                ${data.totalTasks}
                            </h2>
                            <p class="text-muted mb-0">Total Tasks</p>
                        </div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <div class="card text-center p-3 border-0 shadow-sm">
                            <h2 class="fw-bold text-secondary">
                                ${data.tasksByStatus.TODO || 0}
                            </h2>
                            <p class="text-muted mb-0">To Do</p>
                        </div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <div class="card text-center p-3 border-0 shadow-sm">
                            <h2 class="fw-bold text-info">
                                ${data.tasksByStatus.IN_PROGRESS || 0}
                            </h2>
                            <p class="text-muted mb-0">In Progress</p>
                        </div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <div class="card text-center p-3 border-0 shadow-sm">
                            <h2 class="fw-bold text-danger">
                                ${data.overdueTasks}
                            </h2>
                            <p class="text-muted mb-0">Overdue</p>
                        </div>
                    </div>
                `;

            section.classList.remove('d-none');

        } catch (error) {
            alert('Failed to load dashboard!');
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }
</script>
</body>
</html>
