<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .navbar { background: linear-gradient(135deg, #667eea, #764ba2); }
        .task-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 15px;
        }
        .priority-HIGH { border-left: 4px solid #dc3545; }
        .priority-MEDIUM { border-left: 4px solid #ffc107; }
        .priority-LOW { border-left: 4px solid #28a745; }
        .stat-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-dark px-4 py-3">
    <div class="d-flex align-items-center gap-3">
        <a href="projects.html" class="btn btn-outline-light btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
        <span class="navbar-brand fw-bold mb-0">
                <i class="bi bi-kanban"></i> Tasks
            </span>
    </div>
    <div class="d-flex gap-2">
        <button onclick="toggleDashboard()"
                class="btn btn-outline-light btn-sm">
            <i class="bi bi-bar-chart"></i> Dashboard
        </button>
        <button onclick="logout()"
                class="btn btn-outline-light btn-sm">
            <i class="bi bi-box-arrow-right"></i> Logout
        </button>
    </div>
</nav>

<div class="container mt-4">

    <!-- Dashboard Section -->
    <div id="dashboardSection" class="d-none mb-4">
        <div class="card p-4 mb-3 stat-card">
            <h5 class="fw-bold mb-3">
                <i class="bi bi-bar-chart text-primary"></i>
                Project Dashboard
            </h5>
            <div class="row" id="dashboardStats">
                <div class="text-center">
                    <div class="spinner-border text-primary"></div>
                </div>
            </div>
            <!-- Tasks per user -->
            <div id="tasksPerUserSection" class="mt-3 d-none">
                <h6 class="fw-bold">Tasks Per User:</h6>
                <div id="tasksPerUser"></div>
            </div>
        </div>
    </div>

    <!-- Tasks Header -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold">Project Tasks</h3>
        <button class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#createTaskModal">
            <i class="bi bi-plus-circle"></i> New Task
        </button>
    </div>

    <!-- Filter Buttons -->
    <div class="mb-3 d-flex gap-2 flex-wrap">
        <button onclick="filterTasks('ALL')"
                class="btn btn-sm btn-primary" id="filter-ALL">All</button>
        <button onclick="filterTasks('TODO')"
                class="btn btn-sm btn-outline-secondary" id="filter-TODO">
            📋 To Do
        </button>
        <button onclick="filterTasks('IN_PROGRESS')"
                class="btn btn-sm btn-outline-info" id="filter-IN_PROGRESS">
            ⚡ In Progress
        </button>
        <button onclick="filterTasks('DONE')"
                class="btn btn-sm btn-outline-success" id="filter-DONE">
            ✅ Done
        </button>
    </div>

    <!-- Tasks List -->
    <div id="tasksList">
        <div class="text-center py-5">
            <div class="spinner-border text-primary"></div>
            <p class="mt-2">Loading tasks...</p>
        </div>
    </div>
</div>

<!-- Create Task Modal -->
<div class="modal fade" id="createTaskModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Create New Task</h5>
                <button type="button" class="btn-close"
                        data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="taskError" class="alert alert-danger d-none"></div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Title *</label>
                    <input type="text" id="taskTitle" class="form-control"
                           placeholder="Task title">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Description</label>
                    <textarea id="taskDesc" class="form-control" rows="2"
                              placeholder="Task description"></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Due Date *</label>
                        <input type="date" id="taskDueDate" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Priority</label>
                        <select id="taskPriority" class="form-select">
                            <option value="LOW">🟢 Low</option>
                            <option value="MEDIUM" selected>🟡 Medium</option>
                            <option value="HIGH">🔴 High</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Assign To (Email) *</label>
                    <input type="email" id="taskAssignedEmail"
                           class="form-control"
                           placeholder="Enter member's email">
                    <small class="text-muted">
                        Must be a member of this project
                    </small>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary"
                        data-bs-dismiss="modal">Cancel</button>
                <button onclick="createTask()"
                        class="btn btn-primary" id="createTaskBtn">
                    <i class="bi bi-plus-circle"></i> Create Task
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = '';
    const token = localStorage.getItem('token');
    const projectId = localStorage.getItem('currentProjectId');

    if (!token || !projectId) window.location.href = 'login.html';

    let allTasks = [];
    let currentFilter = 'ALL';

    loadTasks();

    async function loadTasks() {
        try {
            const response = await fetch(
                `${API}/api/tasks/project/${projectId}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

            if (!response.ok) {
                throw new Error('Failed');
            }

            allTasks = await response.json();
            displayTasks(allTasks);
        } catch (error) {
            document.getElementById('tasksList').innerHTML =
                `<div class="alert alert-danger">
                        Failed to load tasks! Make sure you are a project member.
                    </div>`;
        }
    }

    function displayTasks(tasks) {
        const list = document.getElementById('tasksList');
        if (!tasks || tasks.length === 0) {
            list.innerHTML = `
                    <div class="text-center py-5">
                        <i class="bi bi-clipboard-x fs-1 text-muted"></i>
                        <p class="mt-2 text-muted">
                            No tasks yet. Create your first task!
                        </p>
                    </div>`;
            return;
        }

        list.innerHTML = tasks.map(task => `
                <div class="card task-card priority-${task.priority} p-3">
                    <div class="d-flex justify-content-between flex-wrap gap-2">
                        <div>
                            <h6 class="fw-bold mb-1">${task.title}</h6>
                            <p class="text-muted small mb-1">
                                ${task.description || 'No description'}
                            </p>
                            <div class="d-flex gap-3 flex-wrap">
                                <small class="text-muted">
                                    <i class="bi bi-calendar"></i>
                                    Due: <strong>${task.dueDate || 'No date'}</strong>
                                </small>
                                <small class="text-muted">
                                    <i class="bi bi-person"></i>
                                    ${task.assignedTo ?
            task.assignedTo.name : 'Unassigned'}
                                </small>
                                <small>
                                    Priority:
                                    <span class="badge ${
            task.priority === 'HIGH' ? 'bg-danger' :
                task.priority === 'MEDIUM' ? 'bg-warning text-dark' :
                    'bg-success'}">
                                        ${task.priority}
                                    </span>
                                </small>
                            </div>
                        </div>
                        <div class="d-flex flex-column align-items-end gap-2">
                            <select onchange="updateStatus(${task.id}, this.value)"
                                    class="form-select form-select-sm"
                                    style="width: 140px">
                                <option ${task.status === 'TODO' ?
            'selected' : ''} value="TODO">
                                    📋 To Do
                                </option>
                                <option ${task.status === 'IN_PROGRESS' ?
            'selected' : ''} value="IN_PROGRESS">
                                    ⚡ In Progress
                                </option>
                                <option ${task.status === 'DONE' ?
            'selected' : ''} value="DONE">
                                    ✅ Done
                                </option>
                            </select>
                            <button onclick="deleteTask(${task.id})"
                                    class="btn btn-outline-danger btn-sm">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
    }

    function filterTasks(status) {
        currentFilter = status;
        // Update button styles
        ['ALL','TODO','IN_PROGRESS','DONE'].forEach(s => {
            const btn = document.getElementById('filter-' + s);
            if (btn) btn.className = btn.className.replace(
                'btn-primary','btn-outline-secondary');
        });
        const activeBtn = document.getElementById('filter-' + status);
        if (activeBtn) activeBtn.className =
            activeBtn.className.replace('btn-outline-secondary','btn-primary');

        if (status === 'ALL') {
            displayTasks(allTasks);
        } else {
            displayTasks(allTasks.filter(t => t.status === status));
        }
    }

    async function updateStatus(taskId, newStatus) {
        try {
            const response = await fetch(
                `${API}/api/tasks/${taskId}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ status: newStatus })
                });
            if (response.ok) {
                loadTasks();
            } else {
                alert('Failed to update status! Only assigned user or Admin can update.');
            }
        } catch (error) {
            alert('Server error!');
        }
    }

    async function deleteTask(taskId) {
        if (!confirm('Delete this task?')) return;
        try {
            const response = await fetch(
                `${API}/api/tasks/${taskId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
            if (response.ok) {
                loadTasks();
            } else {
                alert('Only Admin can delete tasks!');
            }
        } catch (error) {
            alert('Server error!');
        }
    }

    async function createTask() {
        const title = document.getElementById('taskTitle').value.trim();
        const description = document.getElementById('taskDesc').value.trim();
        const dueDate = document.getElementById('taskDueDate').value;
        const priority = document.getElementById('taskPriority').value;
        const assignedEmail = document.getElementById('taskAssignedEmail').value.trim();
        const errEl = document.getElementById('taskError');

        if (!title || !dueDate || !assignedEmail) {
            errEl.textContent = 'Title, Due Date and Assigned Email are required!';
            errEl.classList.remove('d-none');
            return;
        }
        errEl.classList.add('d-none');

        const btn = document.getElementById('createTaskBtn');
        btn.textContent = 'Creating...';
        btn.disabled = true;

        try {
            // Find user by email first
            const userRes = await fetch(
                `${API}/api/users/find?email=${assignedEmail}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

            if (!userRes.ok) {
                errEl.textContent = 'User not found with email: ' + assignedEmail;
                errEl.classList.remove('d-none');
                btn.innerHTML = '<i class="bi bi-plus-circle"></i> Create Task';
                btn.disabled = false;
                return;
            }

            const user = await userRes.json();

            const response = await fetch(`${API}/api/tasks`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({
                    title, description, dueDate, priority,
                    projectId: projectId,
                    assignedTo: String(user.id)
                })
            });

            if (response.ok) {
                bootstrap.Modal.getInstance(
                    document.getElementById('createTaskModal')).hide();
                document.getElementById('taskTitle').value = '';
                document.getElementById('taskDesc').value = '';
                document.getElementById('taskDueDate').value = '';
                document.getElementById('taskAssignedEmail').value = '';
                loadTasks();
            } else {
                const err = await response.text();
                errEl.textContent = err || 'Failed! Make sure you are Admin.';
                errEl.classList.remove('d-none');
            }
        } catch (error) {
            errEl.textContent = 'Server error! Try again.';
            errEl.classList.remove('d-none');
        }

        btn.innerHTML = '<i class="bi bi-plus-circle"></i> Create Task';
        btn.disabled = false;
    }

    let dashboardVisible = false;
    async function toggleDashboard() {
        const section = document.getElementById('dashboardSection');
        if (dashboardVisible) {
            section.classList.add('d-none');
            dashboardVisible = false;
            return;
        }
        dashboardVisible = true;
        section.classList.remove('d-none');
        document.getElementById('dashboardStats').innerHTML =
            '<div class="text-center"><div class="spinner-border text-primary"></div></div>';

        try {
            const response = await fetch(
                `${API}/api/dashboard/${projectId}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
            const data = await response.json();

            document.getElementById('dashboardStats').innerHTML = `
                    <div class="col-6 col-md-3 mb-3">
                        <div class="text-center p-3 bg-primary bg-opacity-10 rounded">
                            <h2 class="fw-bold text-primary">${data.totalTasks}</h2>
                            <p class="mb-0 small">Total Tasks</p>
                        </div>
                    </div>
                    <div class="col-6 col-md-3 mb-3">
                        <div class="text-center p-3 bg-secondary bg-opacity-10 rounded">
                            <h2 class="fw-bold text-secondary">
                                ${data.tasksByStatus.TODO || 0}
                            </h2>
                            <p class="mb-0 small">📋 To Do</p>
                        </div>
                    </div>
                    <div class="col-6 col-md-3 mb-3">
                        <div class="text-center p-3 bg-info bg-opacity-10 rounded">
                            <h2 class="fw-bold text-info">
                                ${data.tasksByStatus.IN_PROGRESS || 0}
                            </h2>
                            <p class="mb-0 small">⚡ In Progress</p>
                        </div>
                    </div>
                    <div class="col-6 col-md-3 mb-3">
                        <div class="text-center p-3 bg-success bg-opacity-10 rounded">
                            <h2 class="fw-bold text-success">
                                ${data.tasksByStatus.DONE || 0}
                            </h2>
                            <p class="mb-0 small">✅ Done</p>
                        </div>
                    </div>
                    <div class="col-6 col-md-3 mb-3">
                        <div class="text-center p-3 bg-danger bg-opacity-10 rounded">
                            <h2 class="fw-bold text-danger">${data.overdueTasks}</h2>
                            <p class="mb-0 small">⚠️ Overdue</p>
                        </div>
                    </div>
                `;

            // Tasks per user
            if (data.tasksPerUser &&
                Object.keys(data.tasksPerUser).length > 0) {
                const section = document.getElementById('tasksPerUserSection');
                section.classList.remove('d-none');
                document.getElementById('tasksPerUser').innerHTML =
                    Object.entries(data.tasksPerUser).map(([name, count]) => `
                            <div class="d-flex justify-content-between
                                        align-items-center border-bottom py-2">
                                <span><i class="bi bi-person"></i> ${name}</span>
                                <span class="badge bg-primary">${count} tasks</span>
                            </div>
                        `).join('');
            }

        } catch (error) {
            document.getElementById('dashboardStats').innerHTML =
                '<p class="text-danger">Failed to load dashboard!</p>';
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }
</script>
</body>
</html>
