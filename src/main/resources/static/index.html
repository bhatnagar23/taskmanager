<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .hero-card {
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .feature-icon {
            font-size: 2rem;
            color: #667eea;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="hero-card text-center">

                <!-- Logo -->
                <i class="bi bi-kanban feature-icon"></i>
                <h1 class="mt-3 fw-bold">Team Task Manager</h1>
                <p class="text-muted fs-5">
                    Manage your team projects and tasks efficiently
                </p>

                <!-- Buttons -->
                <div class="d-grid gap-3 d-sm-flex
                                justify-content-center mt-4">
                    <a href="login.html"
                       class="btn btn-primary btn-lg px-5">
                        <i class="bi bi-box-arrow-in-right"></i>
                        Login
                    </a>
                    <a href="signup.html"
                       class="btn btn-outline-primary btn-lg px-5">
                        <i class="bi bi-person-plus"></i>
                        Sign Up
                    </a>
                </div>

                <!-- Features -->
                <div class="row mt-5">
                    <div class="col-md-4">
                        <i class="bi bi-people feature-icon"></i>
                        <h5 class="mt-2">Team Projects</h5>
                        <p class="text-muted">
                            Create projects and add team members
                        </p>
                    </div>
                    <div class="col-md-4">
                        <i class="bi bi-check2-square feature-icon"></i>
                        <h5 class="mt-2">Task Tracking</h5>
                        <p class="text-muted">
                            Assign and track tasks easily
                        </p>
                    </div>
                    <div class="col-md-4">
                        <i class="bi bi-bar-chart feature-icon"></i>
                        <h5 class="mt-2">Dashboard</h5>
                        <p class="text-muted">
                            View progress and statistics
                        </p>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
